services:
  redis:
    image: redis:7-alpine
    container_name: phpapp_redis
    ports:
      - "6379:6379"
    networks:
      - phpapp_network
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: phpapp_app
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
      - ./dev-php.ini:/usr/local/etc/php/conf.d/dev.ini
    depends_on:
      - db  
      - redis
    networks:
      - phpapp_network
    user: 1000:1000
    
  db:
    image: mysql:8.0
    command: --default-time-zone="+00:00"
    container_name: voltcontainer_db
    restart: always
    volumes:
    - db_data:/var/lib/mysql
    - ./init.sql:/docker-entrypoint-initdb.d/init.sql 
    environment:
      MYSQL_DATABASE: ${DB_NAME:-volt_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-root}      
    ports:
      - "3306:3306"
    networks:
      - phpapp_network
  
networks:
  phpapp_network:
    driver: bridge

volumes:
  db_data:
    driver: local