version: '3'
rpc:
    listen: 'tcp://127.0.0.1:6001'
server:
    command: 'php worker.php'
    relay: pipes
http:
    address: '0.0.0.0:8080'
    middleware:
        - gzip
        - static
    static:
        dir: public
        forbid:
            - .php
            - .htaccess
    pool:
      num_workers: ${RR_HTTP_POOL_NUM_WORKERS:-0}
      debug: ${RR_HTTP_POOL_DEBUG:-false}       
      allocate_timeout: ${RR_HTTP_POOL_ALLOCATE_TIMEOUT:-60s} 
      supervisor:
        max_worker_memory: ${RR_HTTP_POOL_SUPERVISOR_MAX_WORKER_MEMORY:-128}

    read_timeout: ${RR_HTTP_READ_TIMEOUT:-60s}
    write_timeout: ${RR_HTTP_WRITE_TIMEOUT:-60s}
    idle_timeout: ${RR_HTTP_IDLE_TIMEOUT:-60s}

jobs:
  pool:
    num_workers: 2
    max_worker_memory: 100
  consume: { }

kv:
  local:
    driver: memory
    config:
      interval: 60

metrics:
  address: '127.0.0.1:2112'